<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StuMarket | Mis Favoritos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --primary-color: #008cff; --bg-light: #f8f9fa; }
        body { background-color: var(--bg-light); font-family: 'Segoe UI', sans-serif; }
        .fav-card {
            background: white;
            border-radius: 20px;
            border: none;
            transition: 0.3s;
            overflow: hidden;
        }
        .fav-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .btn-remove { color: #ff4757; background: #fff1f2; border: none; border-radius: 10px; padding: 8px 12px; transition: 0.3s; }
        .btn-remove:hover { background: #ff4757; color: white; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="d-flex align-items-center mb-5">
            <a href="{% url 'home' %}" class="btn btn-light rounded-circle me-3 shadow-sm">
                <i class="bi bi-arrow-left fs-4"></i>
            </a>
            <h1 class="fw-bold mb-0"><i class="bi bi-heart-fill text-danger me-2"></i> Mis Favoritos</h1>
        </div>

        <div class="row g-4">
            {% for fav in favoritos %}
            <div class="col-md-4 col-lg-3">
                <div class="fav-card shadow-sm h-100 p-3 text-center">
                    {% if fav.producto.imagen %}
                        <img src="{{ fav.producto.imagen.url }}" class="rounded-3 mb-3" style="height: 150px; width: 100%; object-fit: cover;">
                    {% else %}
                        <div class="bg-light rounded-3 mb-3 d-flex align-items-center justify-content-center" style="height: 150px;">
                            <i class="bi bi-image text-secondary fs-1"></i>
                        </div>
                    {% endif %}
                    
                    <h6 class="fw-bold mb-1">{{ fav.producto.nombre }}</h6>
                    <p class="text-primary fw-bold mb-3">${{ fav.producto.precio }}</p>
                    
                    <div class="d-flex gap-2">
                        <a href="{% url 'detalle_producto' fav.producto.id %}" class="btn btn-outline-primary btn-sm w-100 rounded-pill">Ver</a>
                        <form action="{% url 'eliminar_favorito' fav.id %}" method="POST" class="d-inline">
                            {% csrf_token %}
                            <button type="submit" class="btn-remove"><i class="bi bi-trash"></i></button>
                        </form>
                    </div>
                </div>
            </div>
            {% empty %}
            <div class="col-12 text-center py-5">
                <i class="bi bi-heartbreak display-1 text-muted"></i>
                <h4 class="mt-3 text-muted">Aún no tienes favoritos</h4>
                <a href="{% url 'home' %}" class="btn btn-primary mt-3 rounded-pill px-4">Explorar productos</a>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
