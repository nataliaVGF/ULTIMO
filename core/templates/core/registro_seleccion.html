<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>StuMarket | Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .header-section { padding: 40px 0; border-bottom: 1px solid #dee2e6; margin-bottom: 50px; }
        .btn-role { width: 250px; padding: 20px; font-weight: bold; font-size: 1.2rem; border-radius: 15px; }
    </style>
</head>
<body class="text-center">

    <div class="header-section">
        <h1 class="display-4 fw-bold">Crea una cuenta nueva</h1>
        <p>¿Ya tienes una cuenta? <a href="{% url 'login' %}" class="text-decoration-underline text-dark">Ingresa</a></p>
    </div>

    <div class="container">
        <div class="row justify-content-center gap-5 mt-5">
            <div class="col-md-4">
                <a href="{% url 'registro_cliente' %}" class="btn btn-primary btn-role">Quiero ser cliente</a>
            </div>
            <div class="col-md-4">
                <a href="{% url 'registro_vendedor' %}" class="btn btn-primary btn-role">Quiero ser vendedor</a>
            </div>
        </div>
    </div>

</body>
</html>
