{% extends 'core/base.html' %}
{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="card shadow-lg border-0 text-center p-5" style="max-width: 500px; border-radius: 20px;">
        <div class="card-body">
            <i class="bi bi-shield-lock-fill text-primary mb-4" style="font-size: 4rem;"></i>
            <h2 class="fw-bold mb-3">Correo Enviado</h2>
            <p class="text-muted fs-5">
                Te hemos enviado instrucciones para restablecer tu contraseña. 
                Si la cuenta existe, recibirás un correo en breve.
            </p>
            <div class="alert alert-info small mt-4">
                No olvides revisar tu carpeta de <b>SPAM</b>.
            </div>
            <a href="{% url 'login' %}" class="btn btn-primary w-100 rounded-pill mt-3 fw-bold">Volver al Login</a>
        </div>
    </div>
</div>
{% endblock %}
