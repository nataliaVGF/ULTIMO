{% extends 'core/base.html' %} {% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5 text-center">
            <div class="card shadow-lg border-0 rounded-4 p-4">
                <i class="bi bi-envelope-check display-1 text-primary mb-3"></i>
                <h2 class="fw-bold">Verifica tu correo</h2>
                <p class="text-muted">Hemos enviado un código a: <br><strong>{{ email }}</strong></p>
                
                <form action="{% url 'confirmar_email' %}" method="POST">
                    {% csrf_token %}
                    <div class="mb-4">
                        <input type="text" name="codigo_ingresado" class="form-control form-control-lg text-center fw-bold" placeholder="000000" maxlength="6" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 btn-lg rounded-3">Verificar y Actualizar</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
