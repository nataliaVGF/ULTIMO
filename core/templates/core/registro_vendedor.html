<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>StuMarket | Registro Vendedor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .form-container { max-width: 500px; margin: 30px auto; text-align: left; }
        .btn-registrame { width: 100%; padding: 12px; font-weight: bold; border-radius: 10px; background-color: #008cff; border: none; color: white; }
        /* Ajuste para que la imagen no se desborde del cuadro */
        .profile-img-preview { 
            width: 150px; 
            height: 150px; 
            border: 1px solid #ccc; 
            margin: 10px auto; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: #666; 
            overflow: hidden; 
        }
        .label-custom { font-weight: 500; margin-bottom: 5px; display: block; }
        #imagePreview { width: 100%; height: 100%; object-fit: cover; display: none; }
    </style>
</head>
<body class="text-center">

    <div class="py-4 border-bottom">
        <h1 class="fw-bold">Crea una cuenta nueva</h1>
        <p>¿Ya tienes una cuenta? <a href="{% url 'login' %}" class="text-dark">Ingresa</a></p>
    </div>

    <div class="container">
        <form method="post" enctype="multipart/form-data" class="form-container">
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="label-custom">Escribe tu nombre:</label>
                <input type="text" name="nombre" class="form-control">
            </div>

            <div class="mb-3">
                <label class="label-custom">Escribe tus apellidos:</label>
                <input type="text" name="apellidos" class="form-control">
            </div>

            <div class="mb-3">
                <label class="label-custom">Escribe tu correo electrónico:</label>
                <input type="email" name="email" class="form-control">
            </div>

            <div class="mb-3">
                <label class="label-custom">Escribe tu contraseña:</label>
                <input type="password" name="password" class="form-control">
            </div>

            <div class="mb-3">
                <label class="label-custom">Confirma tu contraseña:</label>
                <input type="password" name="confirm_password" class="form-control">
            </div>

            <div class="mb-3">
                <label class="label-custom">Introduce tu número de teléfono:</label>
                <input type="text" name="telefono" class="form-control">
            </div>

            <div class="mb-3">
                <label class="label-custom">Escribe tu número de control:</label>
                <input type="text" name="numero_control" class="form-control">
            </div>

            <div class="mb-3">
                <label class="label-custom">Introduce tu grupo:</label>
                <input type="text" name="grupo" class="form-control">
            </div>

            <div class="mb-3 p-3 border rounded">
                <label class="label-custom">Selecciona el edificio al que perteneces:</label>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="edificio" id="edificioA" value="Edificio A">
                    <label class="form-check-label" for="edificioA">Edificio A</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="edificio" id="edificioD" value="Edificio D">
                    <label class="form-check-label" for="edificioD">Edificio D</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="edificio" id="edificioF" value="Edificio F">
                    <label class="form-check-label" for="edificioF">Edificio F</label>
                </div>
            </div>

            <div class="mb-3">
                <label class="label-custom">Escribe el número de tu casillero:</label>
                <input type="text" name="casillero" class="form-control">
            </div>

            <div class="mb-3">
                <label class="label-custom">Dirección:</label>
                <input type="text" name="direccion" class="form-control">
            </div>

            <div class="text-center mt-4">
                <label class="label-custom">Sube una foto reciente:</label>
                <div class="profile-img-preview" id="previewContainer">
                    <img id="imagePreview" src="" alt="Vista previa">
                    <span id="placeholderText">Foto</span>
                </div>
                <input type="file" name="foto" id="fotoInput" class="form-control mt-2" accept="image/*">
            </div>

            <button type="submit" class="btn btn-primary btn-registrame mt-4">Regístrame</button>
        </form>
    </div>

    <script>
        const fotoInput = document.getElementById('fotoInput');
        const imagePreview = document.getElementById('imagePreview');
        const placeholderText = document.getElementById('placeholderText');

        fotoInput.addEventListener('change', function() {
            const file = this.files[0];
            
            if (file) {
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    imagePreview.src = e.target.result;
                    imagePreview.style.display = 'block';
                    placeholderText.style.display = 'none';
                }
                
                reader.readAsDataURL(file);
            } else {
                imagePreview.src = "";
                imagePreview.style.display = 'none';
                placeholderText.style.display = 'block';
            }
        });
    </script>
</body>
</html>
