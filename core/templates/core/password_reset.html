{% extends 'core/base.html' %}
{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="card shadow-lg border-0 p-5" style="max-width: 450px; border-radius: 20px;">
        <div class="text-center mb-4">
            <i class="bi bi-person-lock text-primary" style="font-size: 3rem;"></i>
            <h2 class="fw-bold mt-2">Recuperar Acceso</h2>
            <p class="text-muted small">Ingresa tu correo para enviarte un enlace de recuperación.</p>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label class="form-label fw-bold">Correo electrónico:</label>
                <input type="email" name="email" class="form-control" placeholder="tu_correo@utng.edu.mx" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 rounded-pill fw-bold py-2">
                Enviar enlace
            </button>
        </form>
        
        <div class="text-center mt-4">
            <a href="{% url 'login' %}" class="text-decoration-none small">Volver al inicio de sesión</a>
        </div>
    </div>
</div>
{% endblock %}
