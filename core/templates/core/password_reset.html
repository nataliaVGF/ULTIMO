<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Acceso | StuMarket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --primary-color: #4e73df;
            --bg-color: #f4f7f6;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .recovery-card {
            background: white;
            border-radius: 25px;
            border: none;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        .icon-circle-recovery {
            width: 90px;
            height: 90px;
            background: rgba(78, 115, 223, 0.1);
            color: var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px 15px;
            border: 1px solid #d1d3e2;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.25rem rgba(78, 115, 223, 0.1);
        }

        .btn-primary-custom {
            background: linear-gradient(135deg, var(--primary-color), #224abe);
            border: none;
            color: white;
            padding: 12px;
            transition: 0.3s;
        }

        .btn-primary-custom:hover {
            filter: brightness(1.1);
            color: white;
            box-shadow: 0 5px 15px rgba(78, 115, 223, 0.3);
            transform: translateY(-1px);
        }

        .back-link {
            color: #858796;
            transition: 0.2s;
            font-weight: 500;
        }

        .back-link:hover {
            color: var(--primary-color);
        }
    </style>
</head>
<body>

<div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="recovery-card p-4 p-md-5 shadow-lg" style="width: 100%; max-width: 480px;">
        
        <div class="text-center mb-4">
            <h3 class="fw-bold text-primary mb-5">StuMarket</h3>
            <div class="icon-circle-recovery mb-4">
                <i class="bi bi-person-lock" style="font-size: 3rem;"></i>
            </div>
            <h2 class="fw-bold h4 text-dark">Recuperar Acceso</h2>
            <p class="text-muted small px-3">
                Ingresa el correo electrónico asociado a tu cuenta para recibir un enlace de recuperación seguro.
            </p>
        </div>

        <form method="post" novalidate>
            {% csrf_token %}
            
            <div class="mb-4">
                <label class="form-label fw-bold text-dark small ms-1">Correo electrónico:</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0" style="border-radius: 12px 0 0 12px;">
                        <i class="bi bi-envelope text-muted"></i>
                    </span>
                    <input type="email" name="email" class="form-control border-start-0" 
                           placeholder="ejemplo@utng.edu.mx" required 
                           style="border-radius: 0 12px 12px 0;">
                </div>
            </div>

            <button type="submit" class="btn btn-primary-custom w-100 rounded-pill fw-bold py-2 mb-3">
                <i class="bi bi-send-fill me-2"></i> Enviar enlace de recuperación
            </button>
            
            <div class="text-center mt-3">
                <a href="{% url 'login' %}" class="back-link small text-decoration-none">
                    <i class="bi bi-arrow-left me-1"></i> Volver al inicio de sesión
                </a>
            </div>
        </form>

        <div class="mt-5 text-center">
            <p class="text-muted small" style="font-size: 10px;">
                Protegemos tu información académica. &copy; 2026 StuMarket
            </p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
