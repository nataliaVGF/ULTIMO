<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña | StuMarket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --primary-color: #4e73df;
            --bg-color: #f4f7f6;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .password-card {
            background: white;
            border-radius: 25px;
            border: none;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }

        /* Estilizar los campos que genera Django automáticamente */
        form p {
            margin-bottom: 1.5rem;
        }

        input[type="password"], input[type="text"] {
            width: 100%;
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid #d1d3e2;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.25rem rgba(78, 115, 223, 0.1);
        }

        .helptext {
            display: block;
            font-size: 0.75rem;
            color: #858796;
            margin-top: 5px;
        }

        ul.errorlist {
            list-style: none;
            padding: 0;
            color: #e74a3b;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }

        .btn-primary-custom {
            background: linear-gradient(135deg, var(--primary-color), #224abe);
            border: none;
            color: white;
            padding: 12px;
            transition: 0.3s;
        }

        .btn-primary-custom:hover {
            filter: brightness(1.1);
            box-shadow: 0 5px 15px rgba(78, 115, 223, 0.3);
        }
    </style>
</head>
<body>

<div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="password-card p-4 p-md-5 shadow-lg" style="width: 100%; max-width: 480px;">
        
        <div class="text-center mb-4">
            <h3 class="fw-bold text-primary mb-4">StuMarket</h3>
            <div class="mb-3">
                <i class="bi bi-shield-lock-fill text-dark" style="font-size: 3rem;"></i>
            </div>
            <h2 class="fw-bold h4 text-dark">Restablecer Contraseña</h2>
            <p class="text-muted small">Por favor, introduce tu nueva clave de acceso.</p>
        </div>

        <form method="post" novalidate>
            {% csrf_token %}
            
            {% if form.non_field_errors %}
                <div class="alert alert-danger py-2 small">
                    {{ form.non_field_errors }}
                </div>
            {% endif %}

            <div class="mb-4">
                {{ form.as_p }}
            </div>

            <button type="submit" class="btn btn-primary-custom w-100 rounded-pill fw-bold py-2 mb-3">
                <i class="bi bi-key-fill me-2"></i> Actualizar Contraseña
            </button>
            
            <div class="text-center">
                <a href="{% url 'login' %}" class="text-muted small text-decoration-none">
                    <i class="bi bi-arrow-left me-1"></i> Cancelar y volver
                </a>
            </div>
        </form>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
